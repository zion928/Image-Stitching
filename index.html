<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Image Stitcher — 스크롤 캡처 자동 병합</title>
  <style>
    /* ── Reset & Variables ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f172a;
      --surface:     #1e293b;
      --surface2:    #273549;
      --border:      #334155;
      --accent:      #3b82f6;
      --accent-h:    #2563eb;
      --text:        #f1f5f9;
      --text-muted:  #94a3b8;
      --success:     #22c55e;
      --danger:      #ef4444;
      --warn:        #f59e0b;
      --radius:      10px;
      --shadow:      0 4px 24px rgba(0,0,0,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 40px 0 32px;
    }
    header .logo {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 1rem;
    }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Upload Zone ─────────────────────────────────────────────────────── */
    #upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #upload-zone:hover,
    #upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
    }
    #upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #upload-zone .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: block;
      pointer-events: none;
    }
    #upload-zone p {
      color: var(--text-muted);
      pointer-events: none;
    }
    #upload-zone strong {
      color: var(--accent);
    }

    /* ── Image Grid ──────────────────────────────────────────────────────── */
    #images-section { display: none; }

    #image-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-left: 8px;
      font-weight: 400;
    }

    #image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .img-card {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      cursor: grab;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .img-card:active { cursor: grabbing; }
    .img-card.drag-source {
      opacity: 0.4;
      border-color: var(--accent);
    }
    .img-card.drag-target {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.35);
      transform: scale(1.03);
    }
    .img-card img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .img-card-footer {
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .img-order {
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 1px 7px;
      min-width: 24px;
      text-align: center;
    }
    .img-name {
      font-size: 0.7rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .img-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 0.9rem;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .img-delete:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    /* ── Options ─────────────────────────────────────────────────────────── */
    .options-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    .option-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text);
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      transition: border-color 0.15s, background 0.15s;
    }
    .option-label:hover { border-color: var(--accent); background: rgba(59,130,246,0.07); }
    .option-label input { accent-color: var(--accent); width: 16px; height: 16px; }

    .hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      justify-content: center;
      padding: 13px;
      font-size: 1.05rem;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    .btn-success {
      background: #15803d;
      color: #fff;
    }
    .btn-success:hover:not(:disabled) { background: #166534; }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }

    /* ── Progress ────────────────────────────────────────────────────────── */
    #progress-section { display: none; }

    .progress-track {
      background: var(--border);
      border-radius: 100px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a855f7);
      border-radius: 100px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-label {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Result ──────────────────────────────────────────────────────────── */
    #result-section { display: none; }

    #result-canvas-wrapper {
      border-radius: 8px;
      overflow: auto;
      max-height: 540px;
      background: repeating-conic-gradient(#1a2440 0% 25%, #1e293b 0% 50%) 0 0 / 20px 20px;
      cursor: zoom-in;
      text-align: center;
    }
    #result-canvas-wrapper.zoomed { cursor: zoom-out; max-height: none; }

    #result-canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      transition: max-width 0.2s;
    }
    #result-canvas-wrapper.zoomed #result-canvas { max-width: none; }

    .result-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      box-shadow: var(--shadow);
      transition: transform 0.3s, opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Error Banner ────────────────────────────────────────────────────── */
    #error-banner {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 8px;
      padding: 12px 18px;
      color: #fca5a5;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      header .logo { font-size: 1.8rem; }
      #image-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ── Header ── -->
  <header>
    <div class="logo">🔗 Auto Image Stitcher</div>
    <p>스크롤 캡처 이미지를 자동으로 이어붙여 한 장으로 만들어 드립니다</p>
  </header>

  <!-- ── Error Banner ── -->
  <div id="error-banner"></div>

  <!-- ── Upload Zone ── -->
  <div class="card">
    <div id="upload-zone">
      <input type="file" id="file-input" multiple accept="image/*" aria-label="이미지 파일 선택" />
      <span class="upload-icon">📂</span>
      <p><strong>클릭하거나 이미지를 드래그</strong>하여 업로드</p>
      <p style="margin-top:6px; font-size:0.82rem;">JPG · PNG · WebP 지원 · 여러 장 동시 선택 가능</p>
    </div>
  </div>

  <!-- ── Image Preview Grid ── -->
  <div id="images-section">
    <div class="card">
      <div class="card-title">
        업로드된 이미지<span id="image-count"></span>
        &nbsp;—&nbsp;
        <span style="font-size:0.78rem; font-weight:400; color:var(--text-muted)">드래그로 순서 변경 가능</span>
      </div>
      <div id="image-grid"></div>
    </div>

    <!-- ── Options ── -->
    <div class="card">
      <div class="card-title">옵션</div>
      <div class="options-row">
        <label class="option-label">
          <input type="checkbox" id="opt-reorder" checked />
          🔀 자동 순서 정렬
        </label>
        <label class="option-label">
          <input type="checkbox" id="opt-fixed-ui" checked />
          ✂️ 고정 UI 제거 (상태바·헤더·푸터)
        </label>
      </div>
      <p class="hint">
        ℹ️ 자동 순서 정렬: 업로드 순서와 무관하게 올바른 스크롤 순서를 찾습니다.<br />
        고정 UI 제거: 모든 이미지에서 공통으로 나타나는 상단·하단 영역을 자동으로 제거합니다.
      </p>
    </div>

    <!-- ── Stitch Button ── -->
    <button class="btn btn-primary" id="stitch-btn">
      ✨ 이미지 병합 시작
    </button>
  </div>

  <!-- ── Progress ── -->
  <div id="progress-section">
    <div class="card">
      <div class="card-title">처리 중…</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label">준비 중…</div>
    </div>
  </div>

  <!-- ── Result ── -->
  <div id="result-section">
    <div class="card">
      <div class="card-title">병합 결과 (클릭하여 원본 크기 보기)</div>
      <div id="result-canvas-wrapper">
        <canvas id="result-canvas"></canvas>
      </div>
      <div class="result-meta" id="result-meta"></div>
      <div class="action-row">
        <button class="btn btn-success" id="btn-download-png">⬇️ PNG 저장</button>
        <button class="btn btn-success" id="btn-download-jpg">⬇️ JPG 저장</button>
        <button class="btn btn-secondary" id="btn-copy">📋 클립보드에 복사</button>
        <button class="btn btn-secondary" id="btn-reset">🔄 다시 시작</button>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
/* ────────────────────────────────────────────────────────────────────────────
   App State
   ─────────────────────────────────────────────────────────────────────────── */
var state = {
  files: [],       // { id, file, url, name }
  worker: null,
  stitching: false
};

var idSeq = 0;
function nextId() { return ++idSeq; }

/* ────────────────────────────────────────────────────────────────────────────
   Worker
   ─────────────────────────────────────────────────────────────────────────── */
function createWorker() {
  try {
    var w = new Worker('worker.js');
    w.onmessage = handleWorkerMessage;
    w.onerror   = function (e) { showError('Worker 오류: ' + e.message); stopStitching(); };
    return w;
  } catch (e) {
    showError('Web Worker를 시작할 수 없습니다: ' + e.message);
    return null;
  }
}

function handleWorkerMessage(e) {
  var msg = e.data;
  if (msg.type === 'progress') {
    setProgress(msg.payload.percent, msg.payload.message);
  } else if (msg.type === 'result') {
    renderResult(msg.payload);
    stopStitching();
  } else if (msg.type === 'error') {
    showError(msg.payload.message);
    stopStitching();
  }
}

/* ────────────────────────────────────────────────────────────────────────────
   File Upload
   ─────────────────────────────────────────────────────────────────────────── */
var fileInput  = document.getElementById('file-input');
var uploadZone = document.getElementById('upload-zone');

fileInput.addEventListener('change', function () {
  addFiles(Array.from(this.files));
  this.value = '';
});

uploadZone.addEventListener('dragover', function (e) {
  e.preventDefault();
  this.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', function () {
  this.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', function (e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  var items = Array.from(e.dataTransfer.files).filter(function (f) { return f.type.startsWith('image/'); });
  if (items.length) addFiles(items);
});

function addFiles(files) {
  files.forEach(function (file) {
    if (!file.type.startsWith('image/')) return;
    var id  = nextId();
    var url = URL.createObjectURL(file);
    state.files.push({ id: id, file: file, url: url, name: file.name });
  });
  renderGrid();
}

/* ────────────────────────────────────────────────────────────────────────────
   Image Grid with Drag-and-Drop Reorder
   ─────────────────────────────────────────────────────────────────────────── */
var grid = document.getElementById('image-grid');
var imagesSection = document.getElementById('images-section');
var imageCount    = document.getElementById('image-count');
var dragSrcId     = null;

function renderGrid() {
  grid.innerHTML = '';
  var n = state.files.length;
  imageCount.textContent = ' (' + n + '장)';
  imagesSection.style.display = n > 0 ? '' : 'none';

  state.files.forEach(function (entry, idx) {
    var card = document.createElement('div');
    card.className = 'img-card';
    card.draggable  = true;
    card.dataset.id = entry.id;

    var thumb = document.createElement('img');
    thumb.src = entry.url;
    thumb.alt = entry.name;
    card.appendChild(thumb);

    var footer = document.createElement('div');
    footer.className = 'img-card-footer';

    var badge = document.createElement('span');
    badge.className   = 'img-order';
    badge.textContent = idx + 1;

    var nameSpan = document.createElement('span');
    nameSpan.className   = 'img-name';
    nameSpan.title       = entry.name;
    nameSpan.textContent = entry.name;

    var delBtn = document.createElement('button');
    delBtn.className   = 'img-delete';
    delBtn.textContent = '✕';
    delBtn.title       = '삭제';
    delBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      removeFile(entry.id);
    });

    footer.appendChild(badge);
    footer.appendChild(nameSpan);
    footer.appendChild(delBtn);
    card.appendChild(footer);

    // Drag-and-drop event listeners
    card.addEventListener('dragstart', function (e) {
      dragSrcId = entry.id;
      this.classList.add('drag-source');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', function () {
      this.classList.remove('drag-source');
      document.querySelectorAll('.drag-target').forEach(function (el) { el.classList.remove('drag-target'); });
    });
    card.addEventListener('dragover', function (e) {
      e.preventDefault();
      if (dragSrcId !== entry.id) this.classList.add('drag-target');
      e.dataTransfer.dropEffect = 'move';
    });
    card.addEventListener('dragleave', function () {
      this.classList.remove('drag-target');
    });
    card.addEventListener('drop', function (e) {
      e.preventDefault();
      this.classList.remove('drag-target');
      if (dragSrcId !== entry.id) reorderFiles(dragSrcId, entry.id);
    });

    grid.appendChild(card);
  });
}

function removeFile(id) {
  var idx = state.files.findIndex(function (f) { return f.id === id; });
  if (idx === -1) return;
  URL.revokeObjectURL(state.files[idx].url);
  state.files.splice(idx, 1);
  renderGrid();
  hideResult();
}

function reorderFiles(srcId, dstId) {
  var srcIdx = state.files.findIndex(function (f) { return f.id === srcId; });
  var dstIdx = state.files.findIndex(function (f) { return f.id === dstId; });
  if (srcIdx === -1 || dstIdx === -1) return;
  var item = state.files.splice(srcIdx, 1)[0];
  state.files.splice(dstIdx, 0, item);
  renderGrid();
  hideResult();
}

/* ────────────────────────────────────────────────────────────────────────────
   Stitching
   ─────────────────────────────────────────────────────────────────────────── */
document.getElementById('stitch-btn').addEventListener('click', function () {
  if (state.stitching) return;
  if (state.files.length < 2) { showError('이미지를 2장 이상 업로드해 주세요.'); return; }
  startStitching();
});

function startStitching() {
  state.stitching = true;
  hideError();
  hideResult();

  document.getElementById('progress-section').style.display = '';
  setProgress(0, '이미지 로딩 중…');
  document.getElementById('stitch-btn').disabled = true;

  // Load all images into canvases and extract ImageData
  Promise.all(state.files.map(loadImageData))
    .then(function (imageDataList) {
      if (!state.worker) state.worker = createWorker();
      if (!state.worker) { stopStitching(); return; }

      var options = {
        autoReorder:   document.getElementById('opt-reorder').checked,
        removeFixedUI: document.getElementById('opt-fixed-ui').checked
      };

      // Build plain objects (Uint8ClampedArray is structured-clone-friendly)
      var images = imageDataList.map(function (id) {
        return { data: id.data, width: id.width, height: id.height };
      });

      state.worker.postMessage({ type: 'stitch', payload: { images: images, options: options } });
    })
    .catch(function (err) {
      showError('이미지 로딩 오류: ' + err.message);
      stopStitching();
    });
}

function loadImageData(entry) {
  return new Promise(function (resolve, reject) {
    var img = new Image();
    img.onload = function () {
      var canvas = document.createElement('canvas');
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      try {
        resolve(ctx.getImageData(0, 0, canvas.width, canvas.height));
      } catch (e) {
        reject(new Error('이미지 데이터를 읽을 수 없습니다 (CORS 오류일 수 있습니다).'));
      }
    };
    img.onerror = function () { reject(new Error('이미지 파일을 열 수 없습니다: ' + entry.name)); };
    img.src = entry.url;
  });
}

function stopStitching() {
  state.stitching = false;
  document.getElementById('stitch-btn').disabled = false;
  document.getElementById('progress-section').style.display = 'none';
}

/* ────────────────────────────────────────────────────────────────────────────
   Progress
   ─────────────────────────────────────────────────────────────────────────── */
function setProgress(pct, label) {
  document.getElementById('progress-fill').style.width  = pct + '%';
  document.getElementById('progress-label').textContent = label || '';
}

/* ────────────────────────────────────────────────────────────────────────────
   Result Rendering
   ─────────────────────────────────────────────────────────────────────────── */
var resultCanvas  = document.getElementById('result-canvas');
var resultWrapper = document.getElementById('result-canvas-wrapper');
var resultSection = document.getElementById('result-section');
var resultMeta    = document.getElementById('result-meta');

function renderResult(payload) {
  var imgData = new ImageData(new Uint8ClampedArray(payload.data), payload.width, payload.height);
  resultCanvas.width  = payload.width;
  resultCanvas.height = payload.height;
  resultCanvas.getContext('2d').putImageData(imgData, 0, 0);

  resultMeta.textContent = payload.width + ' × ' + payload.height + ' px';
  resultSection.style.display = '';
  resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function hideResult() {
  resultSection.style.display = 'none';
  resultWrapper.classList.remove('zoomed');
}

resultWrapper.addEventListener('click', function () {
  this.classList.toggle('zoomed');
});

/* ────────────────────────────────────────────────────────────────────────────
   Download / Copy
   ─────────────────────────────────────────────────────────────────────────── */
document.getElementById('btn-download-png').addEventListener('click', function () {
  download('png', 'stitched.png');
});
document.getElementById('btn-download-jpg').addEventListener('click', function () {
  download('jpg', 'stitched.jpg');
});

function download(fmt, filename) {
  if (resultCanvas.width === 0) return;
  var mime   = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
  // Quality 0.92: good visual fidelity at roughly 60–70% the size of lossless PNG.
  var quality = fmt === 'jpg' ? 0.92 : undefined;
  var url = resultCanvas.toDataURL(mime, quality);
  var a   = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.click();
}

document.getElementById('btn-copy').addEventListener('click', function () {
  if (!resultCanvas.width) return;
  resultCanvas.toBlob(function (blob) {
    if (!blob) { showToast('복사 실패'); return; }
    if (navigator.clipboard && window.ClipboardItem) {
      navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
        .then(function () { showToast('📋 클립보드에 복사됐습니다!'); })
        .catch(function () { fallbackCopy(); });
    } else {
      fallbackCopy();
    }
  }, 'image/png');
});

function fallbackCopy() {
  showToast('⚠️ 이 브라우저에서는 클립보드 복사가 지원되지 않습니다.');
}

document.getElementById('btn-reset').addEventListener('click', function () {
  state.files.forEach(function (f) { URL.revokeObjectURL(f.url); });
  state.files = [];
  renderGrid();
  hideResult();
  hideError();
  if (state.worker) { state.worker.terminate(); state.worker = null; }
});

/* ────────────────────────────────────────────────────────────────────────────
   Toast & Error helpers
   ─────────────────────────────────────────────────────────────────────────── */
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { el.classList.remove('show'); }, 3000);
}

function showError(msg) {
  var el = document.getElementById('error-banner');
  el.textContent = '⚠️ ' + msg;
  el.style.display = '';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}
</script>
</body>
</html>
